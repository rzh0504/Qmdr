name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional Android build number
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      AIOHTTP_NO_EXTENSIONS: "1"
      MULTIDICT_NO_EXTENSIONS: "1"
      YARL_NO_EXTENSIONS: "1"
      FROZENLIST_NO_EXTENSIONS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Flutter Android toolchain
        run: |
          flutter config --no-analytics
          flutter config --jdk-dir="$JAVA_HOME"
          flutter doctor -v

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python environment
        run: |
          uv python install 3.12
          uv sync --python 3.12 --dev

      - name: Read project version
        id: version
        run: |
          VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Use Android-compatible Python dependencies
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import urllib.request
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          wheel_dir = Path("vendor/android-wheels")
          wheel_dir.mkdir(parents=True, exist_ok=True)

          with urllib.request.urlopen("https://pypi.org/pypi/qqmusic-api-python/0.3.6/json") as response:
              package = json.load(response)
          wheel_url = next(
              item["url"]
              for item in package["urls"]
              if item["packagetype"] == "bdist_wheel" and item["filename"].endswith(".whl")
          )
          wheel_path = wheel_dir / wheel_url.rsplit("/", 1)[1]
          urllib.request.urlretrieve(wheel_url, wheel_path)

          patched_path = wheel_dir / wheel_path.name
          temp_path = wheel_dir / f"{wheel_path.stem}-patched.whl"
          orjson_shim = Path("orjson.py").read_bytes()
          orjson_hash = base64.urlsafe_b64encode(
              hashlib.sha256(orjson_shim).digest()
          ).rstrip(b"=").decode("ascii")
          orjson_record = f"orjson.py,sha256={orjson_hash},{len(orjson_shim)}\n"

          with ZipFile(wheel_path, "r") as src, ZipFile(temp_path, "w", ZIP_DEFLATED) as dst:
              for item in src.infolist():
                  data = src.read(item.filename)
                  if item.filename.endswith(".dist-info/METADATA"):
                      text = data.decode("utf-8")
                      text = text.replace(
                          "Requires-Dist: cryptography<45.0.6,>=45.0.5",
                          "Requires-Dist: cryptography==43.0.1",
                      )
                      text = text.replace("Requires-Dist: orjson>=3.10.15\n", "")
                      data = text.encode("utf-8")
                  elif item.filename.endswith(".dist-info/RECORD"):
                      text = data.decode("utf-8")
                      if not text.endswith("\n"):
                          text += "\n"
                      data = (text + orjson_record).encode("utf-8")
                  dst.writestr(item, data)
              dst.writestr("orjson.py", orjson_shim)

          wheel_path.unlink()
          temp_path.rename(patched_path)

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text = text.replace('"aiohttp>=3.13.5"', '"aiohttp==3.9.5"')
          text = text.replace(
              '"qqmusic-api-python==0.3.6"',
              f'"qqmusic-api-python @ file://{patched_path.resolve()}"',
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Build APK
        env:
          BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          uv run flet build apk . \
            --output dist/android \
            --project qmdr \
            --product Qmdr \
            --description "QQ Music downloader" \
            --org com.qmdr \
            --build-version "$APP_VERSION" \
            --build-number "$BUILD_NUMBER" \
            --android-permissions android.permission.INTERNET=true \
            --android-permissions android.permission.ACCESS_NETWORK_STATE=true \
            --exclude .venv \
            --exclude .git \
            --exclude .agents \
            --exclude .pytest_cache \
            --exclude __pycache__ \
            --exclude build \
            --exclude dist \
            --exclude tests \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude "qqmusic_cred.pkl" \
            --exclude music \
            --cleanup-app \
            --cleanup-packages \
            --no-rich-output \
            --skip-flutter-doctor \
            --yes

      - name: Verify APK output
        run: |
          find dist/android -type f -name "*.apk" -print
          test -n "$(find dist/android -type f -name '*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmdr-android-apk
          path: dist/android/**/*.apk
          if-no-files-found: error
